name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch publications from OpenAlex
        run: node scripts/fetch-publications.js --force

      - name: Start server and pre-render static HTML
        run: |
          # BASE_PATH must be set when starting the server so rendered HTML
          # contains the correct /csilab/... href and src attributes.
          BASE_PATH=/website node server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait until the server responds (up to 15s)
          for i in $(seq 1 15); do
            curl -s -o /dev/null http://localhost:3001/ && break
            echo "Waiting for server... ($i)"
            sleep 1
          done

          npm run build

          kill $SERVER_PID

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
