label: "Frequently Asked Questions"
title: "FAQ"
sub: "Questions about applications, research and partnerships with the lab."
items:
  - question: "How can I join CSI Lab as a student?"
    answer: "We accept undergraduate (research grant), master's and PhD students. Contact us at <strong>gladston@ufop.edu.br</strong> with your CV and a brief description of your research interests. We review applications on a rolling basis."
  - question: "What research lines are available?"
    answer: "We work with AI, computer vision, machine learning, NLP, data science, spatial analysis, biomedical signals (ECG/rPPG), biometrics, deepfake detection, fraud detection, speech recognition and multi-objective optimization."
  - question: "Does the lab offer grants for undergraduates?"
    answer: "Yes. We offer undergraduate research grants (IC) via CNPq and FAPEMIG, as well as grants tied to R&D projects with industry partners. Availability varies with active projects — consult the faculty."
  - question: "Where does CSI Lab publish its research?"
    answer: "We publish in high-impact journals and conferences: Springer Nature, IEEE, ScienceDirect, SBC (SIBGRAPI, SBBD, SBCAS, ENIAC, STIL, GEOINFO)."
  - question: "How does collaboration with companies work?"
    answer: "We carry out R&D projects through UFOP/Embrapii agreements or direct contracts. Projects include diagnosis, AI model development and software delivery. Contact the lab by email to discuss your needs."
