label: "Technology Transfer"
title: "Consulting & R&D"
sub: "Applied research projects with industrial and government partners."
items:
  - title: "EFI Bank — AI for the Financial Sector"
    content: "<strong style=\"color:var(--color-accent);\">3 active R&D projects</strong> in partnership with EFI Bank. We develop AI models for deepfake detection, fraud detection, credit analysis and customer management. Led by Prof. Gladston Moreira &amp; Prof. Eduardo Luz."
  - title: "CGU — NLP Models for the Plataforma Brasil"
    content: "Development of <strong style=\"color:var(--color-accent);\">Natural Language Processing models</strong> for the Comptroller General of the Union (CGU), applied to the Plataforma Brasil for automated analysis of government documents and processes."
  - title: "Embrapii / Escola de Minas — Industrial AI"
    content: "In partnership with Embrapii and UFOP's Escola de Minas, we develop <strong style=\"color:var(--color-accent);\">AI models for industrial applications</strong>, bridging fundamental research with national industry demands."
  - title: "BDMG — Data Science for Credit"
    content: "Consulting in <strong style=\"color:var(--color-accent);\">data science and credit risk assessment</strong> for the Minas Gerais Development Bank (BDMG), developing predictive models for portfolio analysis."
  - title: "BDI — Credit Risk (in development)"
    content: "Ongoing project focused on <strong style=\"color:var(--color-accent);\">data science for credit risk</strong> with BDI, expanding our activity in the financial sector with advanced machine learning techniques."
