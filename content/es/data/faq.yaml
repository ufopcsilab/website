label: "Preguntas Frecuentes"
title: "FAQ"
sub: "Dudas sobre solicitudes, investigación y alianzas con el laboratorio."
items:
  - question: "¿Cómo puedo ingresar al CSI Lab como estudiante?"
    answer: "Aceptamos estudiantes de pregrado (beca de investigación), maestría y doctorado. Escribe a <strong>gladston@ufop.edu.br</strong> con tu CV y una breve descripción de tus intereses de investigación. Revisamos solicitudes de forma continua."
  - question: "¿Cuáles son las líneas de investigación disponibles?"
    answer: "Trabajamos con IA, visión computacional, aprendizaje automático, PLN, ciencia de datos, análisis espacial, señales biomédicas (ECG/rPPG), biometría, detección de deepfake, detección de fraude, reconocimiento de voz y optimización multiobjetivo."
  - question: "¿El lab ofrece becas para estudiantes de pregrado?"
    answer: "Sí. Ofrecemos becas de investigación de pregrado (IC) vía CNPq y FAPEMIG, además de becas vinculadas a proyectos de I+D con socios industriales. La disponibilidad varía según los proyectos activos — consulta a los profesores."
  - question: "¿Dónde publica sus investigaciones el CSI Lab?"
    answer: "Publicamos en revistas y conferencias de alto impacto: Springer Nature, IEEE, ScienceDirect, SBC (SIBGRAPI, SBBD, SBCAS, ENIAC, STIL, GEOINFO)."
  - question: "¿Cómo funciona la colaboración con empresas?"
    answer: "Realizamos proyectos de I+D mediante convenio UFOP/Embrapii o contrato directo. Los proyectos incluyen diagnóstico, desarrollo de modelos de IA y entrega de software. Contáctanos por correo electrónico para discutir tu demanda."
