label: "Transferencia de Tecnología"
title: "Consultoría e I+D"
sub: "Proyectos de investigación aplicada con socios industriales y gubernamentales."
items:
  - title: "EFI Bank — IA para el Sector Financiero"
    content: "<strong style=\"color:var(--color-accent);\">3 proyectos de I+D activos</strong> en asociación con EFI Bank. Desarrollamos modelos de IA para detección de deepfake, detección de fraude, análisis de crédito y gestión de clientes. Coordinación: Prof. Gladston Moreira &amp; Prof. Eduardo Luz."
  - title: "CGU — Modelos de PLN para la Plataforma Brasil"
    content: "Desarrollo de modelos de <strong style=\"color:var(--color-accent);\">Procesamiento del Lenguaje Natural</strong> para la Contraloría General de la Unión (CGU), aplicados a la Plataforma Brasil para el análisis automatizado de documentos y procesos gubernamentales."
  - title: "Embrapii / Escola de Minas — IA Industrial"
    content: "En asociación con Embrapii y la Escola de Minas de la UFOP, desarrollamos <strong style=\"color:var(--color-accent);\">modelos de IA para aplicaciones industriales</strong>, integrando investigación fundamental con las demandas del sector productivo nacional."
  - title: "BDMG — Ciencia de Datos para Crédito"
    content: "Consultoría en <strong style=\"color:var(--color-accent);\">ciencia de datos y evaluación de riesgo crediticio</strong> para el Banco de Desarrollo de Minas Gerais (BDMG), con desarrollo de modelos predictivos para análisis de portafolio."
  - title: "BDI — Riesgo de Crédito (en desarrollo)"
    content: "Proyecto en desarrollo orientado a la <strong style=\"color:var(--color-accent);\">ciencia de datos para riesgo crediticio</strong> con el BDI, ampliando nuestra actuación en el sector financiero con técnicas avanzadas de aprendizaje automático."
