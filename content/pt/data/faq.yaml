label: "Perguntas Frequentes"
title: "FAQ"
sub: "Dúvidas sobre candidaturas, pesquisa e parcerias com o laboratório."
items:
  - question: "Como posso entrar no CSI Lab como aluno?"
    answer: "Aceitamos alunos de graduação (IC), mestrado e doutorado. Entre em contato pelo e-mail <strong>gladston@ufop.edu.br</strong> com seu currículo Lattes e uma breve descrição dos seus interesses de pesquisa. Analisamos candidaturas continuamente."
  - question: "Quais são as linhas de pesquisa disponíveis?"
    answer: "Trabalhamos com IA, visão computacional, aprendizado de máquina, PLN, ciência de dados, análise espacial, sinais biomédicos (ECG/rPPG), biometria, detecção de deepfake, fraud detection, reconhecimento de fala e otimização multi-objetivo."
  - question: "O lab tem bolsas para alunos de graduação?"
    answer: "Sim. Temos bolsas de Iniciação Científica (IC) via CNPq e FAPEMIG, além de bolsas vinculadas a projetos de P&D com parceiros industriais. A disponibilidade varia conforme os projetos ativos — consulte os professores."
  - question: "Onde as pesquisas do CSI Lab são publicadas?"
    answer: "Publicamos em periódicos e conferências de alto impacto: Springer Nature, IEEE, ScienceDirect, SBC (SIBGRAPI, SBBD, SBCAS, ENIAC, STIL, GEOINFO)."
  - question: "Como funciona a colaboração com empresas?"
    answer: "Realizamos projetos de P&D mediante convênio com a UFOP/Embrapii ou contrato direto. Os projetos incluem diagnóstico, desenvolvimento de modelos de IA e entrega de software. Entre em contato pelo e-mail do laboratório para discutir sua demanda."
