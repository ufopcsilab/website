label: "Transferência de Tecnologia"
title: "Consultorias e P&D"
sub: "Projetos de pesquisa aplicada com parceiros industriais e governamentais."
items:
  - title: "EFI Bank — IA para o Setor Financeiro"
    content: "<strong style=\"color:var(--color-accent);\">3 projetos de P&D ativos</strong> em parceria com o EFI Bank. Desenvolvemos modelos de IA para detecção de deepfake, detecção de fraude, análise de crédito e gerenciamento de clientes. Coordenação: Prof. Gladston Moreira &amp; Prof. Eduardo Luz."
  - title: "CGU — Modelos de PLN para a Plataforma Brasil"
    content: "Desenvolvimento de modelos de <strong style=\"color:var(--color-accent);\">Processamento de Linguagem Natural</strong> para a Controladoria-Geral da União (CGU), aplicados à Plataforma Brasil para análise automatizada de documentos e processos governamentais."
  - title: "Embrapii / Escola de Minas — IA Industrial"
    content: "Em parceria com a Embrapii e a Escola de Minas da UFOP, desenvolvemos <strong style=\"color:var(--color-accent);\">modelos de IA para aplicações industriais</strong>, integrando pesquisa fundamental com demandas do setor produtivo nacional."
  - title: "BDMG — Ciência de Dados para Crédito"
    content: "Consultoria em <strong style=\"color:var(--color-accent);\">ciência de dados e avaliação de risco de crédito</strong> para o Banco de Desenvolvimento de Minas Gerais (BDMG), com desenvolvimento de modelos preditivos para análise de portfólio."
  - title: "BDI — Risco de Crédito (em desenvolvimento)"
    content: "Projeto em desenvolvimento voltado à <strong style=\"color:var(--color-accent);\">ciência de dados para risco de crédito</strong> com o BDI, expandindo nossa atuação no setor financeiro com técnicas avançadas de aprendizado de máquina."
