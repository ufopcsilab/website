# ─────────────────────────────────────────────────────────────
# SINGLE SOURCE OF TRUTH FOR ALL TEAM MEMBERS
# Edit only this file when adding/removing people.
#
# Fields for faculty / coordinators / collaborators:
#   name        – person's name WITHOUT the Prof./Profa. prefix
#   gender      – omit (defaults male) or set to "f" for female
#                 (controls the Prof./Profa./Prof.ssa prefix per language)
#   role_key    – key that maps to a translated role string in team_i18n.yaml
#   tags        – list of tag IDs from team_tags.yaml
#
#   orcid       – ORCID iD (e.g. "0000-0001-7747-5926")
#                 ★ Preferred identifier for publication fetching.
#                 Guarantees accurate lookup — ORCID is globally unique.
#                 Once set, the fetch script needs no other identifier.
#
#   openalex_id – OpenAlex author ID fallback (e.g. "A5059546983")
#                 Used only when ORCID is not yet available.
#                 Verify once at https://openalex.org/authors/<id> before adding.
#
#   Resolution priority used by scripts/fetch-publications.js:
#     orcid (anchor) → openalex_id (anchor) → name search (NOT anchor, unreliable)
#
#   links       – list of link objects:
#       { text: "static text", href: "..." }   ← for email, Lattes, etc.
#       { key: profile, href: "..." }           ← for profile links (auto-translated)
#
# Fields for students (phd_students, masters_students, undergrads):
#   name        – full name, no prefix needed
#   year        – year they started (integer)
#   links       – same as above (usually just Lattes)
#
# Alumni: just a flat list of name strings.
# ─────────────────────────────────────────────────────────────

