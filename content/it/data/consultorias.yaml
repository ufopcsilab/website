label: "Trasferimento Tecnologico"
title: "Consulenza & R&S"
sub: "Progetti di ricerca applicata con partner industriali e governativi."
items:
  - title: "EFI Bank — IA per il Settore Finanziario"
    content: "<strong style=\"color:var(--color-accent);\">3 progetti R&S attivi</strong> in partnership con EFI Bank. Sviluppiamo modelli di IA per rilevamento di deepfake, frodi, analisi del credito e gestione clienti. Guidati da Prof. Gladston Moreira &amp; Prof. Eduardo Luz."
  - title: "CGU — Modelli NLP per la Plataforma Brasil"
    content: "Sviluppo di <strong style=\"color:var(--color-accent);\">modelli di Elaborazione del Linguaggio Naturale</strong> per il Controllore Generale dell'Unione (CGU), applicati alla Plataforma Brasil per l'analisi automatizzata di documenti e processi governativi."
  - title: "Embrapii / Escola de Minas — IA Industriale"
    content: "In partnership con Embrapii e la Escola de Minas dell'UFOP, sviluppiamo <strong style=\"color:var(--color-accent);\">modelli di IA per applicazioni industriali</strong>, collegando la ricerca fondamentale alle esigenze dell'industria nazionale."
  - title: "BDMG — Data Science per il Credito"
    content: "Consulenza in <strong style=\"color:var(--color-accent);\">data science e valutazione del rischio di credito</strong> per la Banca di Sviluppo di Minas Gerais (BDMG), sviluppando modelli predittivi per l'analisi del portafoglio."
  - title: "BDI — Rischio di Credito (in sviluppo)"
    content: "Progetto in corso focalizzato sulla <strong style=\"color:var(--color-accent);\">data science per il rischio di credito</strong> con BDI, espandendo la nostra attività nel settore finanziario con tecniche avanzate di machine learning."
