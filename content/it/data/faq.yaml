label: "Domande Frequenti"
title: "FAQ"
sub: "Domande su candidature, ricerca e partnership con il lab."
items:
  - question: "Come posso unirmi al CSI Lab come studente?"
    answer: "Accettiamo studenti universitari (borsa di ricerca), magistrali e dottorali. Contattaci a <strong>gladston@ufop.edu.br</strong> con il tuo CV e una breve descrizione dei tuoi interessi di ricerca. Valutiamo le candidature su base continuativa."
  - question: "Quali linee di ricerca sono disponibili?"
    answer: "Lavoriamo con IA, visione artificiale, machine learning, NLP, data science, analisi spaziale, segnali biomedici (ECG/rPPG), biometria, rilevamento di deepfake, rilevamento di frodi, riconoscimento vocale e ottimizzazione multi-obiettivo."
  - question: "Il lab offre borse per studenti universitari?"
    answer: "Sì. Offriamo borse di ricerca universitarie (IC) tramite CNPq e FAPEMIG, oltre a borse legate a progetti R&S con partner industriali. La disponibilità varia con i progetti attivi — consultare il corpo docente."
  - question: "Dove pubblica le sue ricerche il CSI Lab?"
    answer: "Pubblichiamo in riviste e conferenze ad alto impatto: Springer Nature, IEEE, ScienceDirect, SBC (SIBGRAPI, SBBD, SBCAS, ENIAC, STIL, GEOINFO)."
  - question: "Come funziona la collaborazione con le aziende?"
    answer: "Realizziamo progetti R&S tramite accordi UFOP/Embrapii o contratti diretti. I progetti includono diagnosi, sviluppo di modelli IA e consegna di software. Contatta il lab via email per discutere le tue esigenze."
